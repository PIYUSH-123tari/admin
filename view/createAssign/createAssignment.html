<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Assignment</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-dark: #1a6b3c;
      --green-mid: #2d9b5a;
      --green-light: #e8f5ee;
      --text: #1a2e22;
      --muted: #6b8f79;
      --border: #d4e8dc;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--green-light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: -120px; right: -120px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(52,201,116,0.18) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px; left: -100px;
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(26,107,60,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .back-container {
      width: 460px;
      max-width: 100%;
      margin-bottom: 12px;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: white;
      color: var(--green-dark);
      border: 1.5px solid var(--border);
      padding: 8px 18px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      font-family: 'DM Sans', sans-serif;
    }
    .back-btn:hover {
      background: var(--green-dark);
      color: white;
      border-color: var(--green-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(26,107,60,0.25);
    }
    .card {
      background: #ffffff;
      width: 460px;
      max-width: 100%;
      border-radius: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.04), 0 20px 40px rgba(26,107,60,0.10);
      overflow: hidden;
      animation: rise 0.45s cubic-bezier(.22,.68,0,1.2) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-header {
      background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 100%);
      padding: 28px 32px 24px;
      position: relative;
      overflow: hidden;
    }
    .card-header::before {
      content: '';
      position: absolute;
      top: -50px; right: -50px;
      width: 160px; height: 160px;
      background: rgba(255,255,255,0.06);
      border-radius: 50%;
    }
    .card-header::after {
      content: '';
      position: absolute;
      bottom: -30px; left: 60px;
      width: 100px; height: 100px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
    }
    .card-header h2 {
      font-family: 'Sora', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: white;
      letter-spacing: -0.3px;
      position: relative;
    }
    .card-header p {
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      margin-top: 5px;
      position: relative;
    }
    .card-body {
      padding: 28px 32px 32px;
    }
    .field {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 11.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      background: #fafcfb;
      transition: all 0.2s;
    }
    input:focus {
      outline: none;
      border-color: var(--green-mid);
      background: white;
      box-shadow: 0 0 0 3px rgba(45,155,90,0.12);
    }
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Sora', sans-serif;
      cursor: pointer;
      transition: all 0.25s;
      margin-top: 8px;
      letter-spacing: 0.2px;
    }
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(26,107,60,0.35);
    }
    .submit-btn:active { transform: translateY(0); }
  </style>
</head>
<body>
  <div class="back-container">
    <button class="back-btn" onclick="goBack()">← Back</button>
  </div>
  <div class="card">
    <div class="card-header">
      <h2>Create Assignment</h2>
      <p>Schedule a new agent pickup assignment</p>
    </div>
    <div class="card-body">
      <form id="assignmentForm">
        <div class="field">
          <label>Assigned Date</label>
          <input type="date" id="assigned_date" required>
        </div>
        <div class="field">
          <label>Assigned Time (HH:MM:SS)</label>
          <input type="time" id="assigned_time" step="1" required>
        </div>
        <div class="field">
          <label>Agent ObjectId</label>
          <input type="text" id="agentId" placeholder="Enter Agent Id" required>
        </div>
        <button type="submit" class="submit-btn">Create Assignment</button>
      </form>
    </div>
  </div>
  <script src="createAssignment.js"></script>
</body>
</html>
